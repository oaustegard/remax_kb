name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (no torch; heavy/model/network tests self-skip)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,remex,api,handlers,runtime]"
      - name: Run tests
        run: pytest -q
      - name: Codec benchmark (smoke)
        run: python bench/bench_codecs.py --n 500 --queries 50
